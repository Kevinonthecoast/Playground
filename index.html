<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>엘프 러너</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 10;
    }
    #nameForm {
      display: none; flex-direction: column; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.82); border: 2px solid #ffe066;
      border-radius: 12px; padding: 24px 32px;
      pointer-events: all;
    }
    #nameForm h2 { color: #ffe066; font-size: 18px; }
    #nameForm p  { color: #fff; font-size: 12px; }
    #nameInput {
      background: #1a1a1a; border: 2px solid #ffe066; border-radius: 6px;
      color: #fff; font-size: 16px; font-family: monospace;
      padding: 8px 14px; text-align: center; width: 180px; outline: none;
    }
    #submitBtn {
      background: #ffe066; border: none; border-radius: 6px;
      color: #000; font-size: 14px; font-weight: bold; font-family: monospace;
      padding: 8px 24px; cursor: pointer; width: 180px;
    }
    #submitBtn:hover { background: #ffd000; }
    #skipBtn {
      background: transparent; border: none;
      color: #aaa; font-size: 11px; font-family: monospace;
      cursor: pointer; text-decoration: underline;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="nameForm">
    <h2>🏆 기록 등록</h2>
    <p id="scoreDisplay">점수: 0</p>
    <input id="nameInput" type="text" maxlength="10" placeholder="닉네임 입력" autocomplete="off">
    <button id="submitBtn">등록하기</button>
    <button id="skipBtn">건너뛰기</button>
  </div>
</div>

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const GW = 320, GH = 180;
let S=1, OX=0, OY=0;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  S  = Math.min(canvas.width/GW, canvas.height/GH);
  OX = (canvas.width  - GW*S)/2;
  OY = (canvas.height - GH*S)/2;
}
resize();
window.addEventListener('resize', resize);

const GROUND=148, GRAVITY=0.45, JUMP_V=-9.5, CW=58, CH=76;

let mode='loading', score=0, tick=0, spd=2.8;
let anim=0, animT=0, spawnT=0, spawnI=90;
let hi = parseInt(localStorage.getItem('elfHi')||'0');
let leaderboard = [];

const P = {
  x:70, y:GROUND, vy:0, jump:false, slide:false, slideT:0, dead:false,
  get bx(){ return this.x-12; },
  get by(){ return this.slide ? this.y-16 : this.y-CH+8; },
  get bw(){ return 24; },
  get bh(){ return this.slide ? 16 : CH-8; },
};

  if      (r<0.35) obs.push({t:'rock',  x:GW+5,y:GROUND,   w:14,h:20});
  else if (r<0.68) obs.push({t:'log',   x:GW+5,y:GROUND,   w:22,h:14});
  else             obs.push({t:'branch',x:GW+5,y:GROUND-42,w:30,h:6});
}
function hits(o) {
  const oy=o.t==='branch'?o.y:o.y-o.h;
  return P.bx<o.x+o.w && P.bx+P.bw>o.x && P.by<oy+o.h && P.by+P.bh>oy;
}
function initBG() {
  clouds=[]; trees=[]; bushes=[];
  for(let i=0;i<5;i++) clouds.push({x:i*80+20,y:12+Math.random()*18,w:24+Math.random()*14});
  for(let i=0;i<8;i++) trees.push({x:i*50+Math.random()*20,h:24+Math.random()*14});
  for(let i=0;i<10;i++) bushes.push({x:i*38+Math.random()*15,r:5+Math.random()*4});
}
function burst(x,y) {
  const pal=['#cc2200','#2d8a2d','#fff','#f0c090','#ffdd00'];
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*3.5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,life:1,c:pal[i%pal.length],r:1.5+Math.random()*2});
  }
}

// ── Firebase leaderboard ──────────────────────────
async function fetchLeaderboard() {
  if (!FIREBASE_URL || FIREBASE_URL==='YOUR_FIREBASE_URL') return;
  try {
    const res = await fetch(FIREBASE_URL+'/scores.json?orderBy="score"&limitToLast=10');
    const data = await res.json();
    if (!data) { leaderboard=[]; return; }
    leaderboard = Object.values(data)
      .sort((a,b)=>b.score-a.score)
      .slice(0,10);
  } catch(e) { leaderboard=[]; }
}
async function pushScore(name, score) {
  if (!FIREBASE_URL || FIREBASE_URL==='YOUR_FIREBASE_URL') return;
  try {
    await fetch(FIREBASE_URL+'/scores.json', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, score, date: Date.now()})
    });
    await fetchLeaderboard();
  } catch(e){}
}

// ── Name form ─────────────────────────────────────
const nameForm  = document.getElementById('nameForm');
const nameInput = document.getElementById('nameInput');
const submitBtn = document.getElementById('submitBtn');
const skipBtn   = document.getElementById('skipBtn');
const scoreDisp = document.getElementById('scoreDisplay');

function showNameForm(s) {
  scoreDisp.textContent = '점수: ' + s;
  nameInput.value = '';
  nameForm.style.display = 'flex';
  nameInput.focus();
}
function hideNameForm() { nameForm.style.display = 'none'; }

submitBtn.addEventListener('click', async () => {
  const name = nameInput.value.trim() || '익명';
  hideNameForm();
  await pushScore(name, score);
  mode = 'board';
});
skipBtn.addEventListener('click', () => {
  hideNameForm();
  mode = 'board';
  fetchLeaderboard();
});
nameInput.addEventListener('keydown', e => {
  if (e.key==='Enter') submitBtn.click();
});

// ── Elf image ─────────────────────────────────────
let elfImg=null;
function loadElf() {
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{elfImg=img;resolve();};
    img.onerror=()=>resolve();
    img.src=ELF_SRC;
  });
}

function drawElf(cx,by,slide,af,dead) {
  if(!elfImg) return;
  ctx.save(); ctx.translate(Math.round(cx),Math.round(by));
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath();
  ctx.ellipse(0,3,CW*0.5,5,0,0,Math.PI*2); ctx.fill();
  if(dead){
    ctx.rotate(Math.PI/2); ctx.drawImage(elfImg,-CH/2,-CW/2,CH,CW);
  }else if(slide){
    ctx.drawImage(elfImg,-CW*0.9,-CH*0.45,CW*1.8,CH*0.45);
  }else{
    ctx.rotate(0.08); ctx.translate(0,af===0?0:-1.5);
    ctx.drawImage(elfImg,-CW/2,-CH,CW,CH);
  }
  ctx.restore();
}

// ── Drawing ───────────────────────────────────────
function box(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,'#5b9bd5');g.addColorStop(1,'#b8d8a0');
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
  clouds.forEach(c=>{
    box(c.x,c.y+4,c.w,8,'rgba(255,255,255,0.85)');
    box(c.x+4,c.y,c.w-8,8,'rgba(255,255,255,0.85)');
    box(c.x+8,c.y-4,c.w-16,8,'rgba(255,255,255,0.85)');
  });
  trees.forEach(t=>{
    box(t.x-2,GROUND-t.h*0.3,4,t.h*0.3,'#5c3d1e');
    box(t.x-10,GROUND-t.h,20,t.h*0.42,'#1b5e1b');
    box(t.x-7,GROUND-t.h*.67,15,t.h*0.36,'#228b22');
    box(t.x-5,GROUND-t.h*.4,10,t.h*0.3,'#2daa2d');
  });
  box(0,GROUND,GW,GH-GROUND,'#4a7c2f');
  box(0,GROUND,GW,4,'#3d6b27');
  for(let x=0;x<GW;x+=14) box(x,GROUND+2,7,2,'#5a8c3f');
  bushes.forEach(b=>{
    box(b.x-b.r,GROUND-b.r*.8,b.r*2,b.r*.8,'#1a5c1a');
    box(b.x-b.r*.7,GROUND-b.r*1.5,b.r*1.4,b.r*.8,'#228b22');
    box(b.x-b.r*.4,GROUND-b.r*1.9,b.r*.8,b.r*.6,'#2daa2d');
  });
}

function drawObs(o){
  if(o.t==='rock'){
    box(o.x,o.y-o.h,o.w,o.h,'#777');box(o.x,o.y-o.h,o.w,2,'#aaa');
    box(o.x,o.y-o.h,2,o.h,'#999');box(o.x+o.w-2,o.y-o.h,2,o.h,'#555');
  }else if(o.t==='log'){
    box(o.x,o.y-o.h,o.w,o.h,'#8b5e3c');box(o.x,o.y-o.h,o.w,2,'#a0724a');
    for(let i=6;i<o.w-4;i+=7) box(o.x+i,o.y-o.h+2,2,o.h-2,'#6b4423');
  }else{
    box(o.x,o.y,o.w,5,'#6b4423');box(o.x,o.y,o.w,1,'#8b6443');
    for(let i=2;i<o.w-3;i+=6){box(o.x+i,o.y+4,3,5,'#228b22');box(o.x+i-1,o.y+8,5,3,'#2daa2d');}
    ctx.fillStyle='rgba(255,255,80,0.95)';ctx.font='6px monospace';ctx.textAlign='center';
    ctx.fillText('↓ 슬라이드',o.x+o.w/2,o.y-5);
  }
}

function drawHUD(){
  box(2,2,90,22,'rgba(0,0,0,0.4)');
  ctx.fillStyle='#fff';ctx.font='bold 8px monospace';ctx.textAlign='left';
  ctx.fillText('SCORE  '+score,6,12);
  ctx.fillText('BEST   '+hi,6,22);
}

function drawStart(){
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,GW,GH);
  ctx.textAlign='center';
  ctx.fillStyle='#ffe066';ctx.font='bold 22px monospace';ctx.fillText('ELF RUNNER',GW/2,44);
  ctx.fillStyle='#fff';ctx.font='7px monospace';
  ctx.fillText('탭 → 점프   |   아래 스와이프 → 슬라이드',GW/2,64);
  if(Math.floor(tick/30)%2===0){
    ctx.fillStyle='#ffe066';ctx.font='bold 9px monospace';
    ctx.fillText('화면을 탭해서 시작!',GW/2,100);
  }
  // Show leaderboard on start screen
  if(leaderboard.length>0) drawLeaderboardSmall();
}

function drawLeaderboardSmall(){
  box(GW/2-70,110,140,GH-115,'rgba(0,0,0,0.6)');
  ctx.fillStyle='#ffe066';ctx.font='bold 7px monospace';ctx.textAlign='center';
  ctx.fillText('🏆 TOP 랭킹',GW/2,120);
  ctx.font='6px monospace';
  leaderboard.slice(0,5).forEach((e,i)=>{
    const medals=['🥇','🥈','🥉','4.','5.'];
    ctx.fillStyle = i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#fff';
    ctx.fillText(medals[i]+' '+e.name.substring(0,8)+'  '+e.score,GW/2,130+i*10);
  });
}

function drawBoard(){
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,GW,GH);
  ctx.textAlign='center';
  ctx.fillStyle='#ffe066';ctx.font='bold 14px monospace';ctx.fillText('🏆 랭킹보드',GW/2,18);
  if(leaderboard.length===0){
    ctx.fillStyle='#aaa';ctx.font='8px monospace';
    ctx.fillText('아직 기록이 없어요!',GW/2,GH/2);
  } else {
    leaderboard.forEach((e,i)=>{
      const medals=['🥇','🥈','🥉'];
      const rank = i<3 ? medals[i] : (i+1)+'.';
      ctx.fillStyle = i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#fff';
      ctx.font = i<3 ? 'bold 8px monospace' : '7px monospace';
      const name  = e.name.substring(0,10);
      const right = String(e.score).padStart(6,' ');
      ctx.textAlign='left';  ctx.fillText(rank+' '+name, 30, 34+i*14);
      ctx.textAlign='right'; ctx.fillText(right, GW-30,   34+i*14);
    });
  }
  if(Math.floor(tick/30)%2===0){
    ctx.textAlign='center';ctx.fillStyle='#aaa';ctx.font='7px monospace';
    ctx.fillText('탭해서 다시 시작',GW/2,GH-8);
  }
}

// ── Reset ─────────────────────────────────────────
function reset(){
  mode='play';score=0;spd=2.8;tick=0;
  anim=0;animT=0;spawnT=0;spawnI=90;
  obs=[];parts=[];
  P.x=70;P.y=GROUND;P.vy=0;
  P.jump=false;P.slide=false;P.slideT=0;P.dead=false;
  initBG();
}

// ── Input ─────────────────────────────────────────
let ty0=0;
function doJump(){
  if(nameForm.style.display==='flex') return;
  if(mode==='loading'||mode==='start'){reset();return;}
  if(mode==='board'||mode==='dead'){reset();return;}
  if(mode==='play'&&!P.jump&&!P.slide){P.vy=JUMP_V;P.jump=true;}
}
function doSlide(){
  if(mode!=='play'||nameForm.style.display==='flex') return;
  if(!P.jump){P.slide=true;P.slideT=44;}
}

canvas.addEventListener('touchstart',e=>{e.preventDefault();ty0=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  (e.changedTouches[0].clientY-ty0)>22?doSlide():doJump();
},{passive:false});
canvas.addEventListener('click',doJump);
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();}
  if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();doSlide();}
});

// ── Main loop ─────────────────────────────────────
function loop(){
  tick++;
  for(let i=parts.length-1;i>=0;i--){
    const q=parts[i];q.x+=q.vx;q.y+=q.vy;q.vy+=0.18;q.life-=0.024;
    if(q.life<=0)parts.splice(i,1);
  }
  if(mode==='play'){
    score++;
    spd=2.8+score*0.0006;
    animT++;if(animT>=8){animT=0;anim=1-anim;}
    if(P.jump){P.vy+=GRAVITY;P.y+=P.vy;if(P.y>=GROUND){P.y=GROUND;P.vy=0;P.jump=false;}}
    if(P.slide){P.slideT--;if(P.slideT<=0)P.slide=false;}
    clouds.forEach(c=>{c.x-=0.25;if(c.x<-45)c.x=GW+15;});
    trees.forEach(t=>{t.x-=0.55;if(t.x<-25)t.x=GW+15;});
    bushes.forEach(b=>{b.x-=spd*0.55;if(b.x<-15)b.x=GW+15;});
    spawnT++;spawnI=Math.max(55,90-Math.floor(score/600));
    if(spawnT>=spawnI){spawnObs();spawnT=0;}
    for(let i=obs.length-1;i>=0;i--){
      obs[i].x-=spd;
      if(obs[i].x<-40){obs.splice(i,1);continue;}
      if(hits(obs[i])){
        mode='dead';P.dead=true;
        if(score>hi){hi=score;localStorage.setItem('elfHi',hi);}
        burst(P.x,P.y-CH/2);
        // Show name entry after short delay
        setTimeout(()=>{
          if(score>0) showNameForm(score);
          else{mode='board';fetchLeaderboard();}
        },800);
      }
    }
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.setTransform(S,0,0,S,OX,OY);

  if(mode==='loading'){
    ctx.fillStyle='#1a2a1a';ctx.fillRect(0,0,GW,GH);
    ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText('로딩 중...',GW/2,GH/2);
    ctx.restore();requestAnimationFrame(loop);return;
  }

  drawBG();
  obs.forEach(drawObs);

  if(P.dead||mode==='dead')      drawElf(P.x,P.y,false,0,true);
  else if(P.slide)               drawElf(P.x,P.y,true,anim,false);
  else                           drawElf(P.x,P.y,false,anim,false);

  parts.forEach(q=>{
    ctx.globalAlpha=Math.max(0,q.life);
    ctx.fillStyle=q.c;ctx.fillRect(q.x-q.r,q.y-q.r,q.r*2,q.r*2);
  });
  ctx.globalAlpha=1;

  drawHUD();
  if(mode==='start') drawStart();
  if(mode==='board') drawBoard();

  ctx.restore();
  requestAnimationFrame(loop);
}

initBG();
loop();
fetchLeaderboard();
loadElf().then(()=>{mode='start';});
setTimeout(()=>{ if(mode==='loading') mode='start'; }, 3000);
</script>
